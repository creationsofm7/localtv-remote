name: Bug report
description: Report a problem with LocalTV Remote
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please do **not** report security issues here —
        see [SECURITY.md](https://github.com/creationsofm7/localtv-remote/blob/main/SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
      placeholder: When I tap volume up, the slider jumps to 100%...
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Launch the app
        2. Pair the phone
        3. ...
    validations:
      required: true
  - type: input
    id: app-version
    attributes:
      label: App version
      placeholder: 0.1.1
    validations:
      required: true
  - type: input
    id: windows-version
    attributes:
      label: Windows version
      placeholder: Windows 11 23H2
    validations:
      required: true
  - type: input
    id: phone
    attributes:
      label: Phone / browser
      placeholder: iPhone 14, Safari
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Paste any relevant logs or attach screenshots.
    validations:
      required: false
